events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Оптимизация передачи файлов
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    
    # Таймауты для медленных соединений
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;
    
    # Буферизация для производительности
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    # Gzip сжатие (критично для скорости загрузки JS/CSS)
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Map для правильной обработки Connection header для WebSocket
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream backend {
        server sdvpn_api:8000;
    }

    upstream frontend {
        server sdvpn_frontend:80;
    }

    # HTTP сервер - редирект на HTTPS
    server {
        listen 80;
        server_name b2brk.ru;
        
        # Редирект всех HTTP запросов на HTTPS
        return 301 https://$server_name$request_uri;
    }

    # Редирект с домена flokify на основной HTTPS-сайт
    server {
        listen 80;
        server_name flokify.ru www.flokify.ru;
        return 301 https://b2brk.ru$request_uri;
    }

    # HTTPS сервер
    server {
        listen 443 ssl http2;
        server_name b2brk.ru;
        client_max_body_size 10M;

        # SSL сертификаты
        ssl_certificate /etc/nginx/ssl/certificate.crt;
        ssl_certificate_key /etc/nginx/ssl/certificate.key;
        
        # CA сертификат (если нужен для полной цепочки)
        ssl_trusted_certificate /etc/nginx/ssl/certificate_ca.crt;

        # SSL настройки безопасности
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        
        # Оптимизация для медленных соединений
        ssl_buffer_size 8k;

        # Заголовки безопасности (разрешаем внешние ресурсы)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Content Security Policy - разрешаем внешние ресурсы (Google Fonts, Tailwind CDN, Font Awesome)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; img-src 'self' data: https: blob:; connect-src 'self' wss: https:; frame-ancestors 'self';" always;

        location /static/ {
            alias /static/;
            autoindex off;
            
            # Правильные MIME types для JS модулей и CSS
            types {
                application/javascript js mjs;
                text/css css;
            }
            default_type application/octet-stream;
            
            # Кэширование статики на стороне браузера (1 год)
            expires 1y;
            add_header Cache-Control "public, immutable, no-transform";
            
            # Дополнительные заголовки безопасности
            add_header X-Content-Type-Options nosniff;
            
            # Оптимизация для медленных соединений
            sendfile on;
            tcp_nopush on;
        }

        # Поддерживаем и старый, и новый путь WS:
        #   /api/v1/chats/<chat_id>/ws
        #   /api/v1/chats/ws
        location ~ ^/api/v1/chats(/[^/]+)?/ws$ {
            proxy_pass http://b2b_api:8000;
            proxy_http_version 1.1;
            
            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            # WebSocket timeouts
            proxy_read_timeout 86400;
            proxy_connect_timeout 86400;
            proxy_send_timeout 86400;
            
            # Disable buffering for WebSocket
            proxy_buffering off;
        }

        # Общий location для всех API запросов
        location /api/ {
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            
            proxy_pass http://b2b_api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Разрешаем буферизацию для обычных API вызовов для лучшей производительности
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://b2b_api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Проксируем MinIO bucket через домен
        # URL формируется как: https://b2brk.ru/b2b-marketplace/uploads/...
        # MinIO использует path-style URLs: /bucket-name/object-key
        # Проксируем фронтенд на собранный билд
        # Этот блок должен быть последним, чтобы перехватывать все остальные запросы
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            # Для SPA - не кэшируем index.html
            proxy_set_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            proxy_set_header Pragma "no-cache";
            
            # Важно: передаем оригинальный URI для правильной обработки роутов
            proxy_redirect off;
        }
    }

    # Редирект с HTTPS flokify на основной сайт (нужен SSL-сертификат для flokify)
    # Раскомментируйте после получения сертификата для flokify.ru (Let's Encrypt и т.д.)
    # server {
    #     listen 443 ssl http2;
    #     server_name flokify.ru www.flokify.ru;
    #     ssl_certificate /etc/nginx/ssl/flokify_certificate.crt;
    #     ssl_certificate_key /etc/nginx/ssl/flokify_certificate.key;
    #     return 301 https://b2brk.ru$request_uri;
    # }
}