services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdvpn_api
    restart: always
    ports:
      - "${APP_PORT}:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sdvpn_network

  db:
    image: postgres:${POSTGRES_VERSION}
    container_name: sdvpn_db
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5444:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sdvpn_network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: sdvpn_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - sdvpn_network

  nginx:
    image: nginx:alpine
    container_name: sdvpn_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    networks:
      - sdvpn_network

  redis:
    image: redis:7-alpine
    container_name: sdvpn_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sdvpn_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  sdvpn_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
