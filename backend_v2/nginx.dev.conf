events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Map для правильной обработки Connection header для WebSocket
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream backend {
        server b2b_api:8000;
    }

    upstream frontend {
        server b2b_frontend:5173;
    }

    upstream minio {
        server b2b_minio:9000;
    }

    server {
        listen 80;
        server_name localhost b2brk.ru;
        client_max_body_size 10M;

        # Проксируем фронтенд на Vite dev server
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Для HMR (Hot Module Replacement)
            proxy_read_timeout 86400;
            proxy_connect_timeout 86400;
            proxy_send_timeout 86400;
        }

        location /static/ {
            alias /static/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }

        # WebSocket support for chat - должен быть ПЕРЕД общим /api/
        # Поддерживаем и старый, и новый путь WS:
        #   /api/v1/chats/<chat_id>/ws
        #   /api/v1/chats/ws
        location ~ ^/api/v1/chats(/[^/]+)?/ws$ {
            proxy_pass http://b2b_api:8000;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeouts
            proxy_read_timeout 86400;
            proxy_connect_timeout 86400;
            proxy_send_timeout 86400;

            # Disable buffering for WebSocket
            proxy_buffering off;
        }

        # Общий location для всех API запросов
        location /api/ {
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;

            gzip off;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Увеличиваем таймауты для длительных операций (загрузка файлов и т.д.)
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            
            proxy_pass http://b2b_api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header X-Accel-Buffering no;
        }
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://b2b_api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Проксируем MinIO bucket через домен (для dev можно использовать localhost:9000 напрямую)
        # URL формируется как: http://localhost/b2b-marketplace/uploads/...
        # MinIO использует path-style URLs: /bucket-name/object-key
        location ~ ^/b2b-marketplace/ {
            proxy_pass http://minio;
            proxy_http_version 1.1;
            
            # Важно: передаем оригинальный Host для MinIO
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Увеличиваем таймауты для больших файлов
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Увеличиваем размер буфера для больших файлов
            proxy_request_buffering off;
            client_max_body_size 10M;
            
            # Отключаем буферизацию для лучшей производительности
            proxy_buffering off;
        }
    }
}