# Тестовый стенд: test.skydragonbot.ru, HTTPS :443
# Сертификаты на хосте: certbot certonly --nginx -d test.skydragonbot.ru
# Пути как у Let's Encrypt; в docker-compose.staging.yml монтируется /etc/letsencrypt
# PUBLIC_BASE_URL=https://test.skydragonbot.ru (без слэша в конце)

server {
    listen 443 ssl;
    server_name test.skydragonbot.ru;

    ssl_certificate /etc/letsencrypt/live/test.skydragonbot.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.skydragonbot.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /app/frontend;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /sub/ {
        proxy_pass http://fastapi:12345;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        add_header 'Access-Control-Allow-Origin' '*';
    }

    location /import/ {
        proxy_pass http://fastapi:12345/import/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header 'Access-Control-Allow-Origin' '*';
    }
}

server {
    listen 80;
    server_name test.skydragonbot.ru;

    return 301 https://$host$request_uri;
}
