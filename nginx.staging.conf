# Тестовый стенд: test.skydragonbot.ru, HTTPS :443
# Нужны только fullchain.pem и privkey.pem в live/test.skydragonbot.ru/
# (без options-ssl-nginx.conf от certbot — его часто нет при certonly)

server {
    listen 443 ssl;
    server_name test.skydragonbot.ru;

    ssl_certificate /etc/letsencrypt/live/test.skydragonbot.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.skydragonbot.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /app/frontend;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /sub/ {
        proxy_pass http://fastapi:12345;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        add_header 'Access-Control-Allow-Origin' '*';
    }

    location /import/ {
        proxy_pass http://fastapi:12345/import/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header 'Access-Control-Allow-Origin' '*';
    }
}

server {
    listen 80;
    server_name test.skydragonbot.ru;

    return 301 https://$host$request_uri;
}
